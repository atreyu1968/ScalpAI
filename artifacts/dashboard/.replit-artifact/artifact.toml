kind = "web"
previewPath = "/dashboard-build/"
title = "ScalpAI Dashboard Build"
version = "1.0.0"
id = "artifacts/dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dashboard-build/" ]
localPort = 3000

[services.development]
run = "echo 'Dashboard is served via API Server'"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dashboard", "run", "build" ]
publicDir = "artifacts/dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/dashboard-build/"
