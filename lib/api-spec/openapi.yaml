openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ScalpAI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: totp
    description: Two-factor authentication (TOTP)
  - name: apiKeys
    description: Binance API key management
  - name: bots
    description: Bot management and trading
  - name: trades
    description: Trade log operations
  - name: admin
    description: Admin-only operations
  - name: ai
    description: AI signal generation and sentiment

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 2FA code required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    get:
      operationId: getProfile
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/totp/setup:
    post:
      operationId: totpSetup
      tags: [totp]
      summary: Initialize 2FA setup
      security:
        - bearerAuth: []
      responses:
        "200":
          description: TOTP setup data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetupResponse"
        "400":
          description: 2FA already enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/totp/verify:
    post:
      operationId: totpVerify
      tags: [totp]
      summary: Verify and enable 2FA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpVerifyBody"
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpVerifyResponse"
        "400":
          description: Invalid code or setup not initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/totp/disable:
    post:
      operationId: totpDisable
      tags: [totp]
      summary: Disable 2FA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpVerifyBody"
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpVerifyResponse"
        "400":
          description: Invalid code or 2FA not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api-keys:
    get:
      operationId: listApiKeys
      tags: [apiKeys]
      summary: List user API keys
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of API keys (secrets masked)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyItem"
    post:
      operationId: createApiKey
      tags: [apiKeys]
      summary: Add a new Binance API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyBody"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyItem"
        "403":
          description: 2FA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api-keys/{id}:
    patch:
      operationId: updateApiKey
      tags: [apiKeys]
      summary: Update an API key
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApiKeyBody"
      responses:
        "200":
          description: API key updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyItem"
        "403":
          description: 2FA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteApiKey
      tags: [apiKeys]
      summary: Delete an API key
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: x-totp-code
          in: header
          required: false
          schema:
            type: string
      responses:
        "204":
          description: API key deleted
        "403":
          description: 2FA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List user bots
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotItem"
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a new bot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotBody"
      responses:
        "201":
          description: Bot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get bot details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotItem"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBot
      tags: [bots]
      summary: Update bot configuration
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotBody"
      responses:
        "200":
          description: Bot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotItem"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Bot deleted
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/{id}/start:
    post:
      operationId: startBot
      tags: [bots]
      summary: Start a bot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotActionResponse"
        "400":
          description: Cannot start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/{id}/stop:
    post:
      operationId: stopBot
      tags: [bots]
      summary: Stop a bot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotActionResponse"

  /bots/{id}/kill:
    post:
      operationId: killBot
      tags: [bots]
      summary: Emergency kill switch for a bot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot killed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotActionResponse"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/kill-all:
    post:
      operationId: killAllBots
      tags: [bots]
      summary: Kill all bots (panic button)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All bots stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KillAllResponse"

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trade logs
      security:
        - bearerAuth: []
      parameters:
        - name: botId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Trade log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeLogItem"

  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      summary: Get trade details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeLogItem"
        "404":
          description: Trade not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /market/status:
    get:
      operationId: getMarketStatus
      tags: [bots]
      summary: Get market data connection status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Market data status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketStatusResponse"

  /rate-limit/status:
    get:
      operationId: getRateLimitStatus
      tags: [bots]
      summary: Get API rate limit status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rate limit status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitStatusResponse"

  /ai/sentiment:
    get:
      operationId: getAiSentimentList
      tags: [ai]
      summary: Get AI sentiment for all active pairs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI sentiment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSentimentListResponse"

  /ai/sentiment/{pair}:
    get:
      operationId: getAiSentimentByPair
      tags: [ai]
      summary: Get AI sentiment for a specific trading pair
      security:
        - bearerAuth: []
      parameters:
        - name: pair
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI sentiment for pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSentimentItem"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserItem"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user details (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details with bots and API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        totpCode:
          type: string
      required:
        - email
        - password

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        totpEnabled:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - email
        - role
        - totpEnabled
        - createdAt

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    TotpSetupResponse:
      type: object
      properties:
        secret:
          type: string
        qrCode:
          type: string
        uri:
          type: string
      required:
        - secret
        - qrCode
        - uri

    TotpVerifyBody:
      type: object
      properties:
        code:
          type: string
      required:
        - code

    TotpVerifyResponse:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled

    CreateApiKeyBody:
      type: object
      properties:
        label:
          type: string
        apiKey:
          type: string
        apiSecret:
          type: string
        totpCode:
          type: string
      required:
        - label
        - apiKey
        - apiSecret

    UpdateApiKeyBody:
      type: object
      properties:
        label:
          type: string
        apiKey:
          type: string
        apiSecret:
          type: string
        totpCode:
          type: string

    ApiKeyItem:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        permissions:
          type: string
        maskedKey:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - label
        - permissions
        - maskedKey
        - createdAt
        - updatedAt

    AdminUserItem:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        totpEnabled:
          type: boolean
        botCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - email
        - role
        - totpEnabled
        - botCount
        - createdAt

    AdminUserDetail:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        totpEnabled:
          type: boolean
        createdAt:
          type: string
        apiKeys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyItem"
        bots:
          type: array
          items:
            $ref: "#/components/schemas/AdminBotItem"
      required:
        - id
        - email
        - role
        - totpEnabled
        - createdAt
        - apiKeys
        - bots

    AdminBotItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        pair:
          type: string
        mode:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - pair
        - mode
        - status
        - createdAt

    CreateBotBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        pair:
          type: string
          pattern: "^[A-Z0-9]+/[A-Z0-9]+$"
          default: "BTC/USDT"
        mode:
          type: string
          enum: [paper, live]
          default: paper
        apiKeyId:
          type: integer
        leverage:
          type: integer
          minimum: 1
          maximum: 125
          default: 1
        capitalAllocated:
          type: string
          default: "100"
        aiConfidenceThreshold:
          type: string
          default: "85.00"
        stopLossPercent:
          type: string
          default: "0.20"
        maxDailyDrawdownPercent:
          type: string
          default: "5.00"
      required:
        - name

    UpdateBotBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        pair:
          type: string
          pattern: "^[A-Z0-9]+/[A-Z0-9]+$"
        mode:
          type: string
          enum: [paper, live]
        apiKeyId:
          type: integer
        leverage:
          type: integer
          minimum: 1
          maximum: 125
        capitalAllocated:
          type: string
        aiConfidenceThreshold:
          type: string
        stopLossPercent:
          type: string
        maxDailyDrawdownPercent:
          type: string

    BotItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        pair:
          type: string
        mode:
          type: string
        status:
          type: string
        leverage:
          type: integer
        capitalAllocated:
          type: string
        aiConfidenceThreshold:
          type: string
        stopLossPercent:
          type: string
        maxDailyDrawdownPercent:
          type: string
        dailyPnl:
          type: string
        apiKeyId:
          type: integer
          nullable: true
        pausedUntil:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - pair
        - mode
        - status
        - leverage
        - capitalAllocated
        - aiConfidenceThreshold
        - stopLossPercent
        - maxDailyDrawdownPercent
        - dailyPnl
        - createdAt
        - updatedAt

    BotActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    KillAllResponse:
      type: object
      properties:
        stopped:
          type: integer
      required:
        - stopped

    TradeLogItem:
      type: object
      properties:
        id:
          type: integer
        botId:
          type: integer
        pair:
          type: string
        side:
          type: string
        mode:
          type: string
        status:
          type: string
        entryPrice:
          type: string
        exitPrice:
          type: string
          nullable: true
        quantity:
          type: string
        pnl:
          type: string
          nullable: true
        commission:
          type: string
          nullable: true
        slippage:
          type: string
          nullable: true
        aiConfidence:
          type: string
          nullable: true
        aiSignal:
          type: string
          nullable: true
        aiTakeProfitPct:
          type: string
          nullable: true
        aiTp1Pct:
          type: string
          nullable: true
        aiTp2Pct:
          type: string
          nullable: true
        aiTp3Pct:
          type: string
          nullable: true
        tpLevelReached:
          type: integer
        remainingQuantity:
          type: string
          nullable: true
        realizedPnl:
          type: string
          nullable: true
        openedAt:
          type: string
        closedAt:
          type: string
          nullable: true
      required:
        - id
        - botId
        - pair
        - side
        - mode
        - status
        - entryPrice
        - quantity
        - tpLevelReached
        - openedAt

    MarketStatusResponse:
      type: object
      properties:
        activeSymbols:
          type: array
          items:
            type: string
        connections:
          type: array
          items:
            type: object
            properties:
              symbol:
                type: string
              futures:
                type: boolean
              connected:
                type: boolean
              hasOrderBook:
                type: boolean
            required:
              - symbol
              - futures
              - connected
              - hasOrderBook
      required:
        - activeSymbols
        - connections

    AiSignalItem:
      type: object
      properties:
        action:
          type: string
          enum: [LONG, SHORT, HOLD]
        confidence:
          type: number
        reasoning:
          type: string
      required:
        - action
        - confidence
        - reasoning

    AiSentimentItem:
      type: object
      properties:
        pair:
          type: string
        status:
          type: string
          enum: [active, waiting, error, no_data]
        lastSignal:
          $ref: "#/components/schemas/AiSignalItem"
          nullable: true
        lastSnapshot:
          type: object
          nullable: true
        lastAnalysisAt:
          type: string
          nullable: true
        analysisCount:
          type: integer
        errorCount:
          type: integer
        lastError:
          type: string
          nullable: true
      required:
        - pair
